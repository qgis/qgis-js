<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>qgis-js-example-features</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div id="top">
        <aside>
          <h3>Layer</h3>
          <select id="layer-select"></select>
          <p id="summary"></p>
          <h3>Fields</h3>
          <table id="fields-table">
            <thead>
              <tr>
                <th>name</th>
                <th>type</th>
                <th>length</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </aside>
        <div id="map"></div>
        <aside id="identify">
          <h3>Identify</h3>
          <label class="inline">
            Hit box (px):
            <input id="hit-box" type="number" min="1" max="50" value="5" />
          </label>
          <p id="identify-summary">Click the map to identify features</p>
          <div id="identify-list"></div>
        </aside>
      </div>
      <div id="bottom">
        <h3>Features</h3>
        <div class="actions">
          <button id="filter-by-view">Filter by current view</button>
          <button id="reset" disabled>Reset filter</button>
          <label class="inline">
            Page size:
            <select id="page-size">
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50" selected>50</option>
              <option value="100">100</option>
              <option value="200">200</option>
            </select>
          </label>
          <nav id="pagination"></nav>
        </div>
        <div class="features-scroll">
          <table id="features-table">
            <thead>
              <tr></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
    <div id="popup"></div>
    <template id="identify-card-template">
      <div class="identify-card">
        <table>
          <thead>
            <tr>
              <th>Field</th>
              <th>Value</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </template>
    <script type="module" src="main.js"></script>
  </body>
</html>
